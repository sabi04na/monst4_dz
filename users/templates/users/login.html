<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
</head>
<body>
    <h1>Вход в систему</h1>
    <form method="post">
        {% csrf_token %}
        <p>Логин: <input type="text" name="username" required></p>
        <p>Пароль: <input type="password" name="password" required></p>
        <button type="submit">Войти</button>
    </form>
    <p>Нет аккаунта <a href="{% url 'register' %}">Зарегистрироваться</a></p>
</body>
</html>
